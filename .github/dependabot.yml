# Dependabot: monthly batched updates instead of one PR per package.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      # Runs on the first day of each month (UTC).
      interval: 'monthly'
    # Allow both version-update groups (minor/patch + major) to stay open.
    open-pull-requests-limit: 2
    allow:
      - dependency-type: 'direct'
    groups:
      # Safe bumps: one PR for all minor + patch updates each month.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      # Breaking bumps: separate PR so a failed major does not block minors.
      major:
        applies-to: version-updates
        update-types:
          - 'major'
        patterns:
          - '*'
      # One PR for security fixes (security updates are not bound to the
      # monthly schedule; grouping still avoids a PR-per-CVE flood).
      all-security:
        applies-to: security-updates
        patterns:
          - '*'
